<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spaceship - Battle</title>
    <link rel="stylesheet" href="/frontend/css/menu.css" />
    <link rel="icon" type="image/png" href="/frontend/assets/icon.png" />
    <script src="/frontend/script/menu.js" defer></script>
  </head>
  <body>
    <img
      class="background-img"
      src="/frontend/assets/background/fondmenu.png"
      alt="Fond"
    />

    <div class="overlay"></div>

    <div class="sidebar"></div>

    <div class="main-content">
      <img class="title-img" src="/frontend/assets/title.png" alt="Titre" />

      <div class="menu-container">
        <button class="menu-btn" type="button" data-action="pvp" style="--i: 0">
          <span>Player VS Player</span>
        </button>

        <button
          class="menu-btn"
          type="button"
          data-action="2pv2p"
          style="--i: 1"
        >
          <span>Team VS Team</span>
        </button>

        <button class="menu-btn" type="button" data-action="bot" style="--i: 2">
          <span>Player VS Bot</span>
        </button>

        <button
          class="menu-btn"
          type="button"
          data-action="credits"
          style="--i: 3"
        >
          <span>Crédits</span>
        </button>

        <button
          class="menu-btn"
          type="button"
          data-action="quit"
          style="--i: 4"
        >
          <span>Quitter</span>
        </button>
      </div>
    </div>
  </body>
</html>
