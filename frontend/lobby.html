<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spaceship - Battle</title>
  <link rel="stylesheet" href="/frontend/css/menu.css" />
  <link rel="stylesheet" href="/frontend/css/lobby.css" />
  <link rel="icon" type="image/png" href="/frontend/assets/icon.png" />
  <script src="/socket.io/socket.io.js"></script>
</head>

<body>
  <div class="overlay"></div>
  <div class="sidebar-lobby"></div>

  <div class="main-content-lobby">
    <img class="title-img" src="/frontend/assets/title.png" alt="Titre" />

    <div class="menu-container-lobby">
      <button class="menu-btn" type="button" data-action="retour" id="btn-lobby-retour" style="--i: 2">
        <span>Retour</span>
      </button>
      <button class="menu-btn" type="button" data-action="skin" id="btn-SkinMenu" style="--i: 3">
        <span>Skins</span>
      </button>
      <button class="menu-btn" type="button" data-action="isReady" id="btn-Ready" style="--i: 4">
        <span>PRÊT</span>
      </button>
    </div>
  </div>

  <div id="lobby-zone">
    <img class="lobby-bg-top" src="/frontend/assets/background/fondlobbyJoueur1.png" alt="Fond" />
    <img class="lobby-bg-bottom" src="/frontend/assets/background/fondlobbyJoueur2.png" alt="Fond" />
    <div class="lobby-separator"></div>
  </div>

  <!-- EMPLACEMENTS (Team A à gauche, Team B à droite) -->
  <div id="slot-A1" class="lobby-slot pos-A1 hidden">
    <button class="empty-btn" id="btn-add-A1">+</button>
    <div class="player-content hidden" id="content-A1">
      <button class="arrow-btn prev-arrow hidden" id="prev-skin-A1">◀</button>
      <img class="img-skin" id="img-A1" src="/frontend/assets/man/skin1/000.png" alt="Skin" />
      <button class="arrow-btn next-arrow hidden" id="next-skin-A1">▶</button>
      <div class="shadow-base shadow-A"></div>
    </div>
  </div>

  <div id="slot-A2" class="lobby-slot pos-A2 hidden">
    <button class="empty-btn" id="btn-add-A2">+</button>
    <div class="player-content hidden" id="content-A2">
      <button class="arrow-btn prev-arrow hidden" id="prev-skin-A2">◀</button>
      <img class="img-skin" id="img-A2" src="/frontend/assets/man/skin1/000.png" alt="Skin" />
      <button class="arrow-btn next-arrow hidden" id="next-skin-A2">▶</button>
      <div class="shadow-base shadow-A"></div>
    </div>
  </div>

  <div id="slot-B1" class="lobby-slot pos-B1 hidden">
    <button class="empty-btn" id="btn-add-B1">+</button>
    <div class="player-content hidden" id="content-B1">
      <button class="arrow-btn prev-arrow hidden" id="prev-skin-B1">◀</button>
      <img class="img-skin" id="img-B1" src="/frontend/assets/man/skin1/000.png" alt="Skin" />
      <button class="arrow-btn next-arrow hidden" id="next-skin-B1">▶</button>
      <div class="shadow-base shadow-B"></div>
    </div>
  </div>

  <div id="slot-B2" class="lobby-slot pos-B2 hidden">
    <button class="empty-btn" id="btn-add-B2">+</button>
    <div class="player-content hidden" id="content-B2">
      <button class="arrow-btn prev-arrow hidden" id="prev-skin-B2">◀</button>
      <img class="img-skin" id="img-B2" src="/frontend/assets/man/skin1/000.png" alt="Skin" />
      <button class="arrow-btn next-arrow hidden" id="next-skin-B2">▶</button>
      <div class="shadow-base shadow-B"></div>
    </div>
  </div>

  <div id="overlay-countdown" class="hidden">
    <div class="countdown-content">
      <h1 id="countdown-text">Lancement dans 3</h1>
    </div>
  </div>

  <script src="/frontend/script/lobby.js"></script>
</body>

</html>
